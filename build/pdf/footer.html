<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  body{margin:0;font-family:"DejaVu Sans","Helvetica",sans-serif;}
  .pn{width:100%;text-align:center;font-size:9px;color:#9aa0aa;letter-spacing:0.10em;}
</style></head>
<body>
  <div class="pn" id="pn"></div>
  <script>
    (function(){
      function q(n){var m=new RegExp('[?&]'+n+'=([^&]*)').exec(location.search);return m?decodeURIComponent(m[1]):'';}
      var page=q('page'), topage=q('topage');
      if(page && page!=='1'){ document.getElementById('pn').textContent = page + '  /  ' + topage; }
    })();
  </script>
</body></html>
